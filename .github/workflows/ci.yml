name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run buf lint
        run: buf lint

      - name: Run buf breaking check
        # TEMPORARY: continue-on-error is intentionally set to true only during the
        # early schema-shaping phase (pre-v0.1), where main has no useful baseline
        # to diff against and breaking changes are expected as the schema is iterated.
        # This MUST be flipped to false (i.e. made blocking) once the v0.1 schema
        # stabilizes, so that subsequent PRs cannot silently introduce wire-breaking
        # changes.
        continue-on-error: true
        run: buf breaking --against '.git#branch=main'

      - name: Verify pb2 regeneration is idempotent
        run: |
          make generate_python_protos
          git diff --exit-code generated/python/ || \
            (echo "generated/python/ is out of sync with protos — re-run 'make generate_python_protos' and commit the result" && exit 1)

      - name: Run pytest
        run: pytest tests/ -v
