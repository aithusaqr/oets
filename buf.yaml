version: v2
modules:
  - path: .
    name: buf.build/aithusaqr/oets
lint:
  use:
    - STANDARD
  except:
    # All enums use *_UNSPECIFIED = 0 per the v0.1 sentinel convention, but
    # enum value names are not yet prefixed with their enclosing enum name
    # (e.g. BUY vs ORDER_SIDE_BUY), which buf's ENUM_ZERO_VALUE_SUFFIX rule
    # also enforces. Removing this except requires the ENUM_VALUE_PREFIX
    # rename below to land first.
    - ENUM_ZERO_VALUE_SUFFIX
    # Many enum values are not prefixed with the UPPER_SNAKE name of their
    # enclosing enum (e.g. OrderSide.BUY should be ORDER_SIDE_BUY). Paired
    # with the Phase 2 rename above.
    - ENUM_VALUE_PREFIX
    # buf expects package oets.v1 files to live under oets/v1/, but the repo
    # currently lays them under common/, common/execution/, common/reconciliation/.
    # Re-enabling this rule requires relocating every .proto and updating
    # every import — a separate layout-restructure ticket.
    - PACKAGE_DIRECTORY_MATCH
    # Paired with PACKAGE_DIRECTORY_MATCH: oets.v1 files are spread across
    # multiple subdirectories rather than a single directory.
    - PACKAGE_SAME_DIRECTORY
breaking:
  use:
    - FILE
