syntax = "proto3";
import "common/source.proto";
import "common/timestamps.proto";
import "common/relationships.proto";

package oets.v1;

// EventType enumerates every first-class event kind carried by an
// OetsEventEnvelope.  Values MUST form a contiguous sequence starting at 0
// with no gaps — a missing value would cause any serialised message carrying
// that wire number to silently decode as UNKNOWN_EVENT_TYPE = 0.
// See: https://github.com/aithusaqr/oets/issues/8 (#8 — no-gaps invariant)
// R2-3 (#22): cash-flow entry renamed to drop redundant _EVENT suffix (value 6
// unchanged, wire-compat); EVENT_TYPE_FUNDING = 7 added for funding_event.proto.
enum EventType{
  UNKNOWN_EVENT_TYPE = 0;
  EVENT_TYPE_FILL = 1;
  EVENT_TYPE_ORDER = 2;
  EVENT_TYPE_POSITION = 3;
  EVENT_TYPE_SETTLEMENT = 4;  // closes gap; matches common/reconciliation/settlement_event.proto
  EVENT_TYPE_BALANCE = 5;
  EVENT_TYPE_CASH_FLOW = 6;
  EVENT_TYPE_FUNDING = 7;
}

message OetsEventEnvelope {
  string event_id = 1;

  // SemVer 2.0.0 version string identifying the OETS schema revision
  // this envelope conforms to.
  //
  // Format: MAJOR.MINOR.PATCH[-prerelease][+build]
  //   regex: ^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*)?(?:\+[0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*)?$
  //
  // Migration: MAJOR bumps may be wire-incompatible. Consumers SHOULD
  // reject envelopes whose declared MAJOR exceeds the highest version
  // they implement. MINOR bumps add optional fields. PATCH is editorial.
  //
  // See: https://github.com/aithusaqr/oets/issues/20
  // See: https://semver.org/spec/v2.0.0.html
  string oets_version = 2;
  EventType event_type = 3;

  SourceReference source = 4;
  EventTimestamp timestamps = 5;
  repeated EventRelationship relationships = 6;

  map<string, string> extensions = 100;
}
