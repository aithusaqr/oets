// Numeric fields in this file follow the OETS int64 scaling convention.
// See docs/SCALING.md for the canonical rules. Briefly:
//   - price fields: int64 scaled by 10^price_precision from InstrumentRef
//   - quantity / size fields: int64 scaled by 10^size_precision from InstrumentRef
//   - notional / amount / fee / pnl: int64 scaled by 10^price_precision
//   (or 8 decimals for non-instrument amounts)

syntax = "proto3";

package oets.v1;

import "common/execution_venue.proto";
import "common/account.proto";
import "common/event_envelope.proto";
import "common/instrument.proto";
import "common/execution/order_event.proto";
import "common/reconciliation/position_event.proto";
import "common/reconciliation/fee_event.proto";

// FillEvent records the execution of a fill against an order.
//
// Source attribution lives in OetsEventEnvelope.source — do NOT add a
// top-level source field here (field 15 was removed in #19).
// Timestamps live in the envelope; the top-level timestamps field
// (19) was removed in M2 (#9).
message FillEvent {
  // Field 15 ("source") was removed — it duplicated OetsEventEnvelope.source.
  // See: https://github.com/aithusaqr/oets/issues/19
  // Field 19 ("timestamps") was removed — it duplicated OetsEventEnvelope.timestamps.
  // See: https://github.com/zachisit/oets/issues/9
  // Fields 12 ("fee") and 13 ("fee_asset") removed in R3-1 (#43): replaced by
  // repeated Fee fees = 12. Field 13 reserved. Old name "fee" reserved; field
  // 14 renamed from notional_fee to total_notional_fee (same type/number).
  // See: https://github.com/zachisit/oets/issues/43
  reserved 13, 15, 19;
  reserved "source", "timestamps", "fee", "fee_asset", "notional_fee";

  OetsEventEnvelope envelope = 1;

  AccountRef account = 2;
  InstrumentRef instrument = 3;
  ExecutionVenue venue = 4;

  string order_id = 5;
  string client_order_id = 6;
  string execution_id = 7;

  OrderSide order_side = 8;
  int64 quantity = 9;
  int64 price = 10;
  int64 notional_value = 11;

  // All fees applied to this fill (trading, protocol, priority, etc.).
  // Each Fee carries its own asset, amount, and FeeType — supports multi-fee
  // fills (e.g. a swap with both trading fee and protocol fee).
  repeated Fee fees = 12;

  // Total of all fees expressed in the instrument's quote-asset notional units.
  // Computed by summing each Fee's contribution converted to the quote-asset
  // at the time of fill. Optional — may be 0 if not pre-computed.
  int64 total_notional_fee = 14;

  int64 realized_pnl = 16;
  string realized_pnl_asset = 17;
  PositionSide position_side = 18;
}