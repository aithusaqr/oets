syntax = "proto3";

package oets.v1;

import "common/execution_venue.proto";
import "common/account.proto";
import "common/event_envelope.proto";
import "common/instrument.proto";

enum OrderSide {
  ORDER_SIDE_UNSPECIFIED = 0;
  BUY = 1;
  SELL = 2;
}

enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  LIMIT = 1;
  MARKET = 2;
  LIMIT_POST_ONLY = 3;
  ORDER_TYPE_IMMEDIATE_OR_CANCEL = 4;
  ORDER_TYPE_FILL_OR_KILL = 5;
  TWAP = 6;
  ICEBERG = 7;
  OTHER = 8;
  STOP = 9;
  STOP_LIMIT = 10;
  BRACKET = 11;
}

enum OrderState {
  ORDER_STATE_UNSPECIFIED = 0;
  CREATED = 1;
  SENT = 2;
  PENDING = 3;
  ACKED = 4;
  ACCEPTED = 5;
  REJECTED = 6;
  PENDING_CANCEL = 7;
  EXPIRED = 8;
  PARTIALLY_FILLED = 9;
  FILLED = 10;
  CANCELLED = 11;
  FAILED = 12;
  DONE = 13;
  CLOSED = 14;
}

enum OrderTimeInForce {
  ORDER_TIF_UNSPECIFIED = 0;
  GOOD_TIL_CANCEL = 1;
  ORDER_TIF_IMMEDIATE_OR_CANCEL = 2;
  ORDER_TIF_FILL_OR_KILL = 3;
}

enum OrderIntentionType {
  ORDER_INTENTION_TYPE_UNSPECIFIED = 0;
  RESTING = 1;
  CROSSING = 2;
  CANCEL = 3;
  ONE_CANCELS_OTHER = 4;
}

message OrderEvent {
  OetsEventEnvelope envelope = 1;

  AccountRef account = 2;
  InstrumentRef instrument = 3;
  ExecutionVenue venue = 4;

  string order_id = 5;
  string client_order_id = 6;

  OrderSide side = 7;
  OrderType order_type = 8;
  OrderState order_state = 9;
  OrderTimeInForce order_tif = 10;

  int64 price = 11;
  int64 quantity = 12;

  reserved 13, 14;
  reserved "source", "timestamps";

  OrderIntentionType order_intention_type = 15;
}
