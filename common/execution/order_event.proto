// Numeric fields in this file follow the OETS int64 scaling convention.
// See docs/SCALING.md for the canonical rules. Briefly:
//   - price fields: int64 scaled by 10^price_precision from InstrumentRef
//   - quantity / size fields: int64 scaled by 10^size_precision from InstrumentRef
//   - notional / amount / fee / pnl: int64 scaled by 10^price_precision
//   (or 8 decimals for non-instrument amounts)

syntax = "proto3";

package oets.v1;

import "common/execution_venue.proto";
import "common/account.proto";
import "common/event_envelope.proto";
import "common/instrument.proto";

// M3 (#10): UNKNOWN_ORDER_SIDE=0 sentinel added so unset fields do not silently
// decode as BUY. Existing values shifted up by 1 (BUY: 0→1, SELL: 1→2).
// Wire-incompatible by design — old data with side=0 now decodes as UNKNOWN.
enum OrderSide {
  UNKNOWN_ORDER_SIDE = 0;
  BUY = 1;
  SELL = 2;
}

enum OrderType{
   UNKNOWN_ORDER_TYPE = 0;
    LIMIT = 1;
    MARKET = 2;
    LIMIT_POST_ONLY = 3;
    ORDER_TYPE_IMMEDIATE_OR_CANCEL = 4;
    ORDER_TYPE_FILL_OR_KILL = 5;
    TWAP = 6;
    ICEBERG = 7;
    OTHER = 8;
    STOP = 9;
    STOP_LIMIT = 10;
    BRACKET = 11;
}

enum OrderState {
  UNKNOWN_ORDER_STATE = 0;
    CREATED = 1;
    SENT = 2;
    PENDING = 3;
    ACKED = 4;
    ACCEPTED = 5;
    REJECTED = 6;
    PENDING_CANCEL = 7;
    EXPIRED = 8;
    PARTIALLY_FILLED = 9;
    FILLED = 10;
    CANCELLED = 11;
    FAILED = 12;
    DONE = 13;
    CLOSED = 14;
}

// M3 (#10): UNKNOWN_ORDER_TIME_IN_FORCE=0 sentinel added so unset fields do not
// silently decode as GOOD_TIL_CANCEL. Existing values shifted up by 1.
// Wire-incompatible by design.
enum OrderTimeInForce {
  UNKNOWN_ORDER_TIME_IN_FORCE = 0;
  GOOD_TIL_CANCEL = 1;
  ORDER_TIF_IMMEDIATE_OR_CANCEL = 2;
  ORDER_TIF_FILL_OR_KILL = 3;
}

// M3 (#10): UNKNOWN_ORDER_INTENTION_TYPE=0 sentinel added so unset fields do
// not silently decode as RESTING. Existing values shifted up by 1.
// Wire-incompatible by design.
enum OrderIntentionType {
  UNKNOWN_ORDER_INTENTION_TYPE = 0;
  RESTING = 1;
  CROSSING = 2;
  CANCEL = 3;
  ONE_CANCELS_OTHER = 4;
}

// OrderEvent records a lifecycle state change for an order.
//
// Source attribution lives in OetsEventEnvelope.source — do NOT add a
// top-level source field here (field 13 was removed in #20).
// Timestamps live in the envelope; the top-level timestamps field
// (14) was removed in #20, mirroring the L6 (#19) and M2 (#9) fix on FillEvent.
message OrderEvent {
  // Field 13 ("source") was removed — it duplicated OetsEventEnvelope.source.
  // See: https://github.com/zachisit/oets/issues/20
  // Field 14 ("timestamps") was removed — it duplicated OetsEventEnvelope.timestamps.
  // See: https://github.com/zachisit/oets/issues/20 (mirrors L6 #19 and M2 #9 on FillEvent)
  reserved 13, 14;
  reserved "source", "timestamps";

  OetsEventEnvelope envelope = 1;

  AccountRef account = 2;
  InstrumentRef instrument = 3;
  ExecutionVenue venue = 4;

  string order_id = 5;
  string client_order_id = 6;

  OrderSide side = 7;
  OrderType order_type = 8;
  OrderState order_state = 9;
  OrderTimeInForce order_tif = 10;

  int64 price = 11;
  int64 quantity = 12;

  OrderIntentionType order_intention_type = 15;
}