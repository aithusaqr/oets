
// Numeric fields in this file follow the OETS int64 scaling convention.
// See docs/SCALING.md for the canonical rules. Briefly:
//   - price fields: int64 scaled by 10^price_precision from InstrumentRef
//   - quantity / size fields: int64 scaled by 10^size_precision from InstrumentRef
//   - notional / amount / fee / pnl: int64 scaled by 10^price_precision
//   (or 8 decimals for non-instrument amounts)

syntax = "proto3";

package oets.v1;



// Fee represents a fee charged in association with a trade or account event.
//
// Monetary fields follow the int64 scale convention established by H3 (#7):
// values are integers scaled by the instrument's price_precision exponent
// (e.g. price_precision=6 means 1.5 USDC is represented as 1500000).
// Fee.amount is in the same scaled units as the related fill's price/quantity;
// the denomination asset is carried separately in the `asset` field.
//
// Changing amount from string to int64 is tracked in #13.
// fee_type uses the FeeType enum (field 3), replacing the raw string; closes #6.
message Fee {
  string asset = 1;
  int64 amount = 2;
  FeeType fee_type = 3;

}

enum FeeType{
  FEE_TYPE_UNKNOWN = 0;
  FEE_TYPE_TRADING = 1;
  FEE_TYPE_FUNDING = 2;
  FEE_TYPE_ACCOUNT = 3;
  FEE_TYPE_BORROW = 4;
  FEE_TYPE_PROTOCOL = 5;
  FEE_TYPE_PRIORITY = 6;
}