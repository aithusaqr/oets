
syntax = "proto3";

package oets.v1;



message Fee {
  string asset = 1;
  string amount = 2;
  string fee_type = 3;

}

enum FeeType{
  FEE_TYPE_UNKNOWN = 0;
  FEE_TYPE_TRADING = 1;
  FEE_TYPE_FUNDING = 2;
  FEE_TYPE_ACCOUNT = 3;
  FEE_TYPE_BORROW = 4;
  FEE_TYPE_PROTOCOL = 5;
  FEE_TYPE_PRIORITY = 6;
}