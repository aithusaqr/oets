syntax = "proto3";

package oets.v1;

enum FeeType {
  FEE_TYPE_UNSPECIFIED = 0;
  FEE_TYPE_TRADING = 1;
  FEE_TYPE_FUNDING = 2;
  FEE_TYPE_ACCOUNT = 3;
  FEE_TYPE_BORROW = 4;
  FEE_TYPE_PROTOCOL = 5;
  FEE_TYPE_PRIORITY = 6;
}

message Fee {
  string asset = 1;
  int64 amount = 2;
  FeeType fee_type = 3;
}
