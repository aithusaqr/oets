// funding_event.proto — H1 (#5) v0.1.1 deliverable.
// Defines FundingRate (what a venue quotes for a funding interval) and
// FundingPayment (what was actually paid to/from a specific account).
//
// Numeric fields in this file follow the OETS int64 scaling convention.
// See docs/SCALING.md for the canonical rules. Briefly:
//   - price fields: int64 scaled by 10^price_precision from InstrumentRef
//   - quantity / size fields: int64 scaled by 10^size_precision from InstrumentRef
//   - notional / amount / fee / pnl: int64 scaled by 10^price_precision
//   (or 8 decimals for non-instrument amounts)
// Exception: int64 rate fields (rate, rate_applied) use a separate fixed 9
//   decimal-place convention (1_000_000_000 = 1.0), giving sub-basis-point
//   precision while keeping all arithmetic in integer land.

syntax = "proto3";

package oets.v1;

import "common/event_envelope.proto";

// Direction of a funding payment: which side of the book pays the other.
enum FundingPaymentDirection {
  FUNDING_PAYMENT_DIRECTION_UNSPECIFIED = 0;
  FUNDING_PAYMENT_DIRECTION_LONG_PAYS_SHORT = 1;
  FUNDING_PAYMENT_DIRECTION_SHORT_PAYS_LONG = 2;
}

// What the venue/protocol quoted for a single funding interval.
message FundingRate {
  // R2-2 (#21): OetsEventEnvelope replaces the top-level event_id/timestamps/
  // source/related_events fields.  event_id is now carried by envelope.event_id.
  OetsEventEnvelope envelope = 1;

  // Removed in R2-2 (#21): top-level timestamps/source/related_events.
  reserved 7, 8, 9;
  reserved "timestamps", "source", "related_events";
  // Note: "event_id" name is reserved because the old type at field 1 was string.
  reserved "event_id";

  string venue_id = 2;
  string instrument_id = 3;

  // Funding rate for this interval; fixed-point, 9 decimal places.
  // 1_000_000_000 = 1.0 (100 %).  Typical 8-hour perp rate ≈ ±100_000 (0.01 %).
  int64 rate = 4;

  // Length of the funding interval in seconds.  Typical value: 28800 (8 h).
  int64 funding_interval_seconds = 5;

  FundingPaymentDirection direction = 6;

  // Kept distinct from envelope.extensions (different semantic: message-level
  // vs envelope-level metadata).
  map<string, string> metadata = 10;
}

// What was actually paid to (or from) a specific account for one funding interval.
message FundingPayment {
  // R2-2 (#21): OetsEventEnvelope replaces the top-level event_id/timestamps/
  // source/related_events fields.  event_id is now carried by envelope.event_id.
  OetsEventEnvelope envelope = 1;

  // Removed in R2-2 (#21): top-level timestamps/source/related_events.
  reserved 10, 11, 12;
  reserved "timestamps", "source", "related_events";
  // Note: "event_id" name is reserved because the old type at field 1 was string.
  reserved "event_id";

  string venue_id = 2;
  string account_id = 3;
  string instrument_id = 4;
  string asset_id = 5;

  // Signed amount in asset_id units (scaled per H3 / asset precision).
  // Positive = account received funds; negative = account paid funds.
  int64 amount = 6;

  // Position size that drove this payment, int64 scaled per instrument precision.
  int64 position_size = 7;

  // The funding rate applied; same fixed-point (9 dp) scaling as FundingRate.rate.
  int64 rate_applied = 8;

  // event_id of the corresponding FundingRate event.
  string related_funding_rate_event_id = 9;

  // Kept distinct from envelope.extensions (different semantic: message-level
  // vs envelope-level metadata).
  map<string, string> metadata = 13;
}
