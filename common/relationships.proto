syntax = "proto3";

package oets.v1;

enum RelationshipType{
  RELATIONSHIP_TYPE_UNSPECIFIED = 0;
  RELATIONSHIP_TYPE_FILLS_ORDER = 1;
  RELATIONSHIP_TYPE_FEE_FOR_FILL = 2;
  RELATIONSHIP_TYPE_CANCELS_ORDER = 3;
  RELATIONSHIP_TYPE_OBSERVES_TRANSACTION = 4;
}

message EventRelationship {
  RelationshipType relationship_type = 1;
  string related_event_id = 2;
}