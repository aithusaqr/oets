syntax = "proto3";

package oets.v1;

enum SourceType {
  SOURCE_TYPE_UNSPECIFIED = 0;
  SOURCE_TYPE_BOT = 1;
  SOURCE_TYPE_WALLET = 2;
  SOURCE_TYPE_PROTOCOL = 3;
  SOURCE_TYPE_INDEXER = 4;
  SOURCE_TYPE_ROUTER = 5;
  SOURCE_TYPE_VENUE = 6;
  SOURCE_TYPE_RISK_SYSTEM = 7;
  SOURCE_TYPE_INTERNAL = 8;
  SOURCE_TYPE_VENUE_REST = 9;
  SOURCE_TYPE_VENUE_WS = 10;
  SOURCE_TYPE_VENUE_OTHER = 11;
}

message SourceReference {
  string source_id = 1;
  SourceType source_type = 2;
  string source_name = 3;
}

